name: Build Android WebView APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. کوڈ ڈاؤن لوڈ کرنا
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. جاوا (JDK) سیٹ اپ کرنا
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    # 3. نوڈ جے ایس (Node.js) سیٹ اپ کرنا
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # یا جو بھی ورژن آپ استعمال کر رہے ہیں

    # 4. نوڈ پیکجز اور ڈیپینڈینسیز انسٹال کرنا
    - name: Install Dependencies
      run: npm install

    # 5. ویب ایپ کا بلڈ بنانا (یہ 'www' یا 'dist' فولڈر بنائے گا)
    - name: Build Web Application
      run: npm run build --if-present

    # 6. کپیسیٹر کو اینڈرائیڈ کے ساتھ سنک کرنا (یہ سب سے اہم سٹیپ ہے جو ایرر ختم کرے گا)
    - name: Capacitor Sync Android
      run: npx cap sync android

    # 7. گریڈل (Gradle) کو کیشے اور سیٹ اپ کرنا
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # 8. اینڈرائیڈ پروجیکٹ کو بلڈ کرنا (APK بنانا)
    - name: Build Debug APK
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    # 9. تیار شدہ APK فائل کو گٹ ہب پر اپلوڈ کرنا
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-WebView-App
        path: android/app/build/outputs/apk/debug/app-debug.apk # پاتھ کو بھی 'android/' کے ساتھ درست کر دیا ہے 
