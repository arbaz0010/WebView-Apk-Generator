name: Build Android WebView APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # اس سے آپ مینولی (manually) بھی بٹن دبا کر بلڈ شروع کر سکتے ہیں

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. کوڈ ڈاؤن لوڈ کرنا
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. جاوا (JDK) سیٹ اپ کرنا جو اینڈرائیڈ بلڈ کے لیے ضروری ہے
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    # 3. گریڈل (Gradle) کو کیشے اور سیٹ اپ کرنا تاکہ بلڈ تیز ہو
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # 4. اینڈرائیڈ پروجیکٹ کو بلڈ کرنا (APK بنانا)
    # نوٹ: اگر یہ پروجیکٹ نوڈ جے ایس (Node.js) بیسڈ ہے تو کمنٹس ہٹا کر npm رن کریں
    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    # 5. تیار شدہ APK فائل کو گٹ ہب پر اپلوڈ کرنا تاکہ آپ ڈاؤن لوڈ کر سکیں
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-WebView-App
        path: app/build/outputs/apk/debug/app-debug.apk # عام طور پر APK یہاں بنتی ہے
